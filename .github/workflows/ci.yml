name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "${{ matrix.python-version }}"
      - run: python -m pip install --upgrade pip
      - name: Install (core + service + dev)
        run: pip install -e ".[service,dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Types (mypy)
        run: mypy decision_os_min
      - name: Tests (pytest)
        run: pytest -q
        env:
          AUTHGATE_BACKEND: python

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t decision-os-min:ci .
      - name: Smoke-test the container
        run: |
          docker run -d --name dos -p 8080:8080 decision-os-min:ci
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/healthz && break || sleep 1
          done
          curl -sf http://localhost:8080/healthz
          docker rm -f dos
