name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install (core + service + dev)
        run: pip install -e ".[service,dev]"
      - name: Lint
        run: ruff check decision_os_min/
      - name: Types
        run: mypy decision_os_min/
      - name: Tests
        run: pytest -q

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t decision-os-min:ci .
      - name: Smoke-test the container
        run: |
          docker run -d --name dos -p 8080:8080 decision-os-min:ci
          for i in $(seq 1 20); do
            curl -sf http://localhost:8080/healthz && break || sleep 1
          done
          curl -sf http://localhost:8080/healthz
          docker rm -f dos
