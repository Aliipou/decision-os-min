name: release

# Publish to PyPI when a version tag is pushed (e.g. v0.1.0).
# Uses PyPI Trusted Publishing (OIDC) — no API token stored in the repo.
# One-time setup on PyPI: create the project's trusted publisher pointing at
# Aliipou/decision-os-min, workflow release.yml, environment pypi.

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
